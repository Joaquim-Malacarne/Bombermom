<style>

:root{
  --b0:#080c02;--b1:#0e1604;--b2:#1a2806;--b3:#2c4010;

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--b0)}
body{font-family:'Press Start 2P',monospace;display:flex;align-items:center;justify-content:center;gap:10px;padding:8px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:998;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}
/* ── OVERLAY ── */
#ov{position:fixed;inset:0;z-index:200;background:rgba(4,6,1,.96);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#ov.hidden{display:none}
.scr{display:none;flex-direction:column;align-items:center;gap:10px}
.scr.on{display:flex}
.logo{font-size:clamp(12px,2vw,20px);color:var(--acc);line-height:2.2;text-align:center;letter-spacing:2px;
  text-shadow:3px 3px 0 #5a3e00,0 0 16px rgba(212,168,32,.3)}
.logo em{color:var(--b6);font-style:normal}
.box{background:var(--b1);border:3px solid var(--b2);box-shadow:4px 4px 0 #000;
  padding:14px 18px;display:flex;flex-direction:column;gap:8px;align-items:center;min-width:256px}
input.gi{background:#000;border:2px solid var(--acc);color:var(--acc);
  font-family:'Press Start 2P',monospace;font-size:12px;padding:7px 10px;
  outline:none;width:100%;text-align:center;letter-spacing:3px;text-transform:uppercase}
input.gi::placeholder{color:#1a2608;font-size:7px;letter-spacing:1px}
.btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:8px 14px;
  border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:transform .08s}
.btn:active{transform:translate(2px,2px)}
.by{background:var(--acc);color:#000;box-shadow:3px 3px 0 #5a3e00}.by:hover{background:#ffe060}
.br{background:var(--red);color:#fff;box-shadow:3px 3px 0 #500}.br:hover{background:#d04040}
.bb{background:var(--blue);color:#fff;box-shadow:3px 3px 0 #091030}.bb:hover{background:#2858b8}
.st{font-size:8px;color:var(--dim);text-align:center;min-height:14px}
.st.ok{color:var(--b6)}.st.err{color:var(--red)}.st.w{color:var(--acc)}
.rcode{font-size:24px;letter-spacing:7px;color:var(--b6);
  text-shadow:0 0 10px rgba(155,188,15,.5),3px 3px 0 #283808}
.pentry{display:flex;align-items:center;gap:7px;background:#000;
  border:1px solid var(--b2);padding:5px 8px;width:100%;font-size:8px;color:var(--txt)}
.pdot{width:9px;height:9px;border-radius:2px;flex-shrink:0;border:1px solid rgba(0,0,0,.5)}
.hdiv{width:100%;border-top:1px solid var(--b2);margin:2px 0}
.gotitle{font-size:clamp(11px,1.7vw,18px);text-align:center;line-height:1.9;white-space:pre-line}
/* ── SIDEBAR ── */
#sb{display:flex;flex-direction:column;gap:8px;width:158px;flex-shrink:0}
.sp{background:var(--b1);border:2px solid var(--b2);box-shadow:3px 3px 0 #000;padding:8px 9px}
.spt{font-size:6px;letter-spacing:1px;color:var(--dim);margin-bottom:6px;
  padding-bottom:5px;border-bottom:1px solid var(--b2)}
#tmr{font-size:20px;text-align:center;color:var(--b6);letter-spacing:2px;
  text-shadow:2px 2px 0 #283808}
#tmr.d{color:var(--red);animation:blink .45s step-end infinite alternate}
#sw{font-size:7px;text-align:center;color:var(--red);margin-top:3px;min-height:11px;
  animation:blink .5s step-end infinite alternate}
@keyframes blink{to{opacity:.25}}
.sbr{display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:7px;flex-wrap:wrap}
.sbr.dead{opacity:.3}
.sph{font-size:9px;margin-left:auto;color:#c03040;letter-spacing:0}
#pul{font-size:7px;color:var(--b5);line-height:2.1;min-height:12px}
canvas{display:block;image-rendering:pixelated;border:3px solid var(--b3);box-shadow:5px 5px 0 #000}

// Prerender each sprite to an offscreen canvas for speed
function prerender(spr, tint) {
  const oc = document.createElement('canvas'); oc.width = oc.height = 64;
  const ox = oc.getContext('2d');
  const ps = 4;
  for (let i=0; i<256; i++) {
    const ci = spr.px[i]; if (!ci) continue;
    let col = spr.pal[ci];
    if (tint) col = tintColor(col, tint);
    ox.fillStyle = col;
    const r=Math.floor(i/16), c=i%16;
    ox.fillRect(c*ps, r*ps, ps, ps);
  }
  return oc;
}

// Build prerendered cache per sprite × variant
const SPRCC = {}; // normal
const SPRCC_ME = {}; // mega-evolution recolor (brighter)
function initSprites() {
  [0,1,2,3].forEach(i => {
    SPRCC[i] = prerender(SPRITES[i], null);
    SPRCC_ME[i] = prerender(SPRITES[i], [255,220,0,0.5]); // golden tint
  });
}

function tintColor(hex, [tr,tg,tb,ta]) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const nr=Math.min(255,r+(tr-r)*ta), ng=Math.min(255,g+(tg-g)*ta), nb=Math.min(255,b+(tb-b)*ta);
  return `rgb(${nr|0},${ng|0},${nb|0})`;
}

function mkWall() {
  const c=document.createElement('canvas'); c.width=c.height=G;
  const x=c.getContext('2d');
  x.fillStyle='#000'; x.fillRect(0,0,G,G);
  x.fillStyle='#141e06'; x.fillRect(1,1,G-2,G-2);
  x.fillStyle='#1a2808'; x.fillRect(3,3,G-6,G-6);
  x.fillStyle='#101804'; x.fillRect(5,5,G-10,G-10);
  // mortar grooves
  x.fillStyle='#080c02';
  [14,30,46].forEach(y=>x.fillRect(0,y,G,2));
  [18,36].forEach(xx=>x.fillRect(xx,0,2,G));
  return c;
}
function mkSoft() {
  const c=document.createElement('canvas'); c.width=c.height=G;
  const x=c.getContext('2d');
  x.fillStyle='#000'; x.fillRect(0,0,G,G);
  x.fillStyle='#2a1a06'; x.fillRect(1,1,G-2,20);
  x.fillStyle='#1e1204'; x.fillRect(0,23,20,18); x.fillRect(22,23,42,18);
  x.fillStyle='#2a1a06'; x.fillRect(0,43,42,20); x.fillRect(44,43,20,20);
  x.fillStyle='#3a2208';
  x.fillRect(2,2,G-4,18); x.fillRect(1,24,18,16); x.fillRect(23,24,40,16);
  x.fillRect(1,44,40,18); x.fillRect(45,44,18,18);
  x.fillStyle='#4e3010'; // highlight edges
  x.fillRect(2,2,G-4,3); x.fillRect(2,2,3,18);
  return c;
}

const canvas = document.getElementById('game');

let renderState = null;

function render() {
  requestAnimationFrame(render);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#080c02'; ctx.fillRect(0,0,canvas.width,canvas.height);

  if (!renderState?.cells?.length) {
    ctx.fillStyle='#1a2808'; ctx.font='12px "Press Start 2P"';
    ctx.textAlign='center'; ctx.fillText('AGUARDANDO...',canvas.width/2,canvas.height/2);
    return;
  }

  const s = renderState;

  // ── Map ───────────────────────────────────────────────────
  for (let r=0; r<ENG.ROWS; r++) {
    for (let c=0; c<ENG.COLS; c++) {
      if (!s.cells[r]) continue;
      const cell = s.cells[r][c];
      if (cell===CT.WALL)   { ctx.drawImage(wallTile,c*G,r*G); }
      else if (cell===CT.SOFT) { ctx.drawImage(softTile,c*G,r*G); }
      else if (cell===CT.SHRINK) {
        ctx.fillStyle=Math.floor(now/220)%2?'#380a0a':'#1e0404';
        ctx.fillRect(c*G,r*G,G,G);
        ctx.strokeStyle='#660000'; ctx.lineWidth=2;
        ctx.strokeRect(c*G+1,r*G+1,G-2,G-2);
        ctx.strokeStyle='#440000'; ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(c*G+5,r*G+5);ctx.lineTo(c*G+G-5,r*G+G-5);ctx.stroke();
        ctx.beginPath();ctx.moveTo(c*G+G-5,r*G+5);ctx.lineTo(c*G+5,r*G+G-5);ctx.stroke();
      } else {
        ctx.fillStyle=(r+c)%2?'#0a1204':'#0c1606';
        ctx.fillRect(c*G,r*G,G,G);
      }
    }
  }

  // ── Power-ups ─────────────────────────────────────────────
  s.powerups?.forEach(pu => drawPU(pu, now));

  // ── Explosions ────────────────────────────────────────────
  s.explosions?.forEach(e => drawExp(e, now));

  // ── Bombs ─────────────────────────────────────────────────
  s.bombs?.forEach(b => drawBomb(b, now));

  // ── Players ───────────────────────────────────────────────
  s.players?.forEach(p => drawPlayer(p, now));

  // ── Rhydon ────────────────────────────────────────────────
  if (s.rhydon) drawRhydon(s.rhydon, now);

  // ── HUD overlays ──────────────────────────────────────────
  if (s.timer <= ENG.SHRINK_START && s.timer > 0) {
    ctx.save(); ctx.globalAlpha=0.35+0.2*Math.sin(now/220);
    ctx.fillStyle='#aa0000';
    [[0,0,canvas.width,8],[0,canvas.height-8,canvas.width,8],[0,0,8,canvas.height],[canvas.width-8,0,8,canvas.height]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));
    ctx.restore();
  }

  const me = s.players?.find(p=>p.id===myId);
  if (me && !me.alive && me.respawnT > 0) {
    ctx.save(); ctx.globalAlpha=0.82;
    ctx.fillStyle='rgba(0,0,0,.7)';
    ctx.fillRect(canvas.width/2-130,canvas.height/2-32,260,65);
    ctx.font='9px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillStyle='#ffe000';
    ctx.fillText(`RESPAWN ${Math.ceil(me.respawnT/1000)}s`,canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='#7aaa28';
    ctx.fillText(`${me.lives} VIDA(S) RESTANTE${me.lives!==1?'S':''}`,canvas.width/2,canvas.height/2+16);
    ctx.restore();
  }
}

// ── Draw helpers ─────────────────────────────────────────────

function drawPlayer(p, now) {
  if (!p.alive && (!p.respawnT || p.respawnT <= 0)) return;
  const ghost = !p.alive && p.respawnT > 0;
  // Invincibility flash
  if ((p.invT > 0 || p.isIV) && Math.floor(now/100)%2===0) return;
  const scale = p.isME ? 1.25 : 1.0;
  const x = (p.c + 0.5)*G, y = (p.r + 0.5)*G;
  const sz = G * scale;

  ctx.save();
  if (ghost)         ctx.globalAlpha = 0.28 + 0.18*Math.sin(now/210);
  if (p.isCloaked)   ctx.globalAlpha = 0.25 + 0.08*Math.sin(now/180);

  // Status auras
  if (p.hasMS && !ghost) {
    ctx.save(); ctx.globalAlpha=0.5+0.2*Math.sin(now/160);
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=4;
    for(let i=0;i<6;i++){const a=now/350+i*Math.PI/3;ctx.beginPath();ctx.arc(x+Math.cos(a)*(sz/2+10),y+Math.sin(a)*(sz/2+10),5,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
  }
  if (p.isDD && !ghost) {
    ctx.save(); ctx.globalAlpha=0.4;
    for(let i=0;i<6;i++){const a=now/200+i*Math.PI/3,d=sz/2+6+3*Math.sin(now/130+i);
      ctx.fillStyle=i%2?'#ff6000':'#ff2000';ctx.beginPath();ctx.arc(x+Math.cos(a)*d,y+Math.sin(a)*d,4,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }

  // Shadow
  ctx.save(); ctx.globalAlpha*=0.35;
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(x,y+sz*0.42,sz*0.35,sz*0.1,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Sprite (prerendered)
  const sprImg = p.isME ? SPRCC_ME[p.si] : SPRCC[p.si];
  if (sprImg) ctx.drawImage(sprImg, x-sz/2, y-sz/2, sz, sz);

  // Charmander flame animation (sprite index 1)
  if (p.si===1 && !ghost) {
    const fl=Math.sin(now/160)*5;
    ctx.save(); ctx.globalAlpha=ctx.globalAlpha||1;
    drawFlame(ctx, x+sz*0.22, y-sz*0.52+fl, sz*0.14);
    ctx.restore();
  }

  // Name tag
  ctx.save(); ctx.globalAlpha=1;
  ctx.font='7px "Press Start 2P"'; ctx.textAlign='center';
  const nm=(p.name||'?').substring(0,7);
  const tw=ctx.measureText(nm).width;
  ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(x-tw/2-3,y-sz/2-19,tw+6,12);
  ctx.fillStyle=p.color; ctx.fillText(nm,x,y-sz/2-9);
  ctx.restore();

  // Lives hearts
  ctx.save(); ctx.globalAlpha=1;
  ctx.font='11px serif'; ctx.textAlign='center';
  const hc=Math.min(p.lives,5);
  for(let i=0;i<hc;i++){
    ctx.fillStyle='#d02030';
    ctx.fillText('♥',x-(hc-1)*5+i*10,y+sz/2+17);
  }
  ctx.restore();

  ctx.restore();
}

function drawFlame(ctx, x, y, r) {
  // Simple animated flame using rects — GBC style
  const t=Date.now();
  const flicker=[0,2,-2,1,-1][Math.floor(t/100)%5];
  ctx.fillStyle='#FF4400';
  ctx.fillRect(x-r*0.5+flicker,y-r*1.2,r,r*1.4);
  ctx.fillStyle='#FF8800';
  ctx.fillRect(x-r*0.3+flicker,y-r*0.9,r*0.6,r);
  ctx.fillStyle='#FFCC00';
  ctx.fillRect(x-r*0.15+flicker,y-r*0.55,r*0.3,r*0.6);
}

function drawBomb(b, now) {
  const x=(b.c+0.5)*G, y=(b.r+0.5)*G;
  const pulse=Math.sin(now/130)>0;
  const R=pulse?G*0.44:G*0.35;
  const cols={normal:['#111','#ff5500'],skull:['#220028','#cc00ee'],mega:['#001838','#0066ff']};
  const [bc,gc]=cols[b.type]||cols.normal;

  // Glow
  ctx.save(); ctx.globalAlpha=0.2;
  const gg=ctx.createRadialGradient(x,y,0,x,y,R*2.2);
  gg.addColorStop(0,gc); gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(x,y,R*2.2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Body (pixel-ish)
  ctx.fillStyle='#000'; ctx.fillRect(x-R,y-R,R*2,R*2);
  ctx.fillStyle=bc;     ctx.fillRect(x-R+2,y-R+2,R*2-4,R*2-4);
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(x-R+2,y-R+2,R-2,R*0.6);

  // Remote ring
  if (b.remote) {
    ctx.save(); ctx.strokeStyle='#00ccff'; ctx.lineWidth=2;
    const dash=Math.floor(now/80)%2;
    ctx.setLineDash([4,4]); ctx.lineDashOffset=dash*4;
    ctx.strokeRect(x-R-5,y-R-5,R*2+10,R*2+10);
    ctx.restore();
  }

  // Fuse
  const fy=pulse?-G*0.12:0;
  const fc=b.type==='skull'?'#cc00ee':b.type==='mega'?'#0066ff':'#cc8800';
  ctx.strokeStyle=fc; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc((b.c+0.72)*G,(b.r+0.28)*G+fy,9,Math.PI,-Math.PI/2); ctx.stroke();
  if (pulse) {
    const sparks=b.type==='skull'?'#ff80ff':b.type==='mega'?'#80d0ff':'#ffee00';
    ctx.fillStyle=sparks; ctx.fillRect((b.c+0.69)*G-3,(b.r+0.28)*G+fy-14,7,7);
  }
}

function drawExp(e, now) {
  const x=e.c*G, y=e.r*G;
  const h=e.dir?.c!==0, v=e.dir?.r!==0;
  let c0,c1,c2,c3;
  if(e.kind==='thunder'){c0='#001060';c1='#0044c0';c2='#22aaff';c3='#ddf4ff';}
  else if(e.kind==='skull'){c0='#1c0024';c1='#7700aa';c2='#dd44ff';c3='#ffffff';}
  else if(e.kind==='mega'){c0='#001040';c1='#0050d0';c2='#2288ff';c3='#aaddff';}
  else if(e.kind==='shield'){c0='#001840';c1='#2255aa';c2='#55aaff';c3='#ffffff';}
  else{c0='#680000';c1='#b03000';c2='#ff7000';c3='#ffdd80';}

  ctx.fillStyle=c0; ctx.fillRect(x,y,G,G);
  ctx.fillStyle=c1;
  if(e.center||h) ctx.fillRect(x,y+7,G,G-14);
  if(e.center||v) ctx.fillRect(x+7,y,G-14,G);
  ctx.fillStyle=c2;
  if(e.center||h) ctx.fillRect(x,y+15,G,G-30);
  if(e.center||v) ctx.fillRect(x+15,y,G-30,G);
  ctx.fillStyle=c3;
  if(e.center) ctx.fillRect(x+22,y+22,G-44,G-44);

  if(e.kind==='thunder') {
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    const cx2=x+G/2,cy2=y+G/2;
    for(let i=0;i<4;i++){const a=now/600+i*Math.PI/2;
      ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+Math.cos(a)*22,cy2+Math.sin(a)*22);ctx.stroke();}
  }
}

const PU_ICON={bk:'👟',bu:'💣',fu:'🔥',su:'⚡',rm:'📡',iv:'⭐',pg:'🥊',sk:'💀',tw:'⚡',ec:'👻',dd:'🐉',ms:'🛡️',me:'✨',sb:'❤️'};
const PU_COL={bk:'#ff8800',bu:'#ff8800',fu:'#ff4400',su:'#aaff00',rm:'#00aaff',iv:'#ffff00',pg:'#ffaaaa',sk:'#cc44ff',tw:'#44ccff',ec:'#8888ff',dd:'#ff6600',ms:'#4488ff',me:'#ffaa00',sb:'#ff4488'};

function drawPU(pu, now) {
  const cx=pu.c*G+G/2, cy=pu.r*G+G/2;
  const bob=Math.sin(now/400+pu.r*3+pu.c)*2.5;
  const col=PU_COL[pu.type]||'#fff';

  ctx.save(); ctx.globalAlpha=0.25+0.12*Math.sin(now/300+pu.r);
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(cx,cy+bob,G*0.38,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const x=pu.c*G+7, y=pu.r*G+7, w=G-14;
  ctx.fillStyle='#0a1404'; ctx.fillRect(x,y+bob,w,w);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x+1,y+bob+1,w-2,w-2);
  ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(PU_ICON[pu.type]||'?',cx,cy+bob);
  ctx.textBaseline='alphabetic';
}

function drawRhydon(rh, now) {
  const x=(rh.c+0.5)*G, y=(rh.r+0.5)*G;
  const sz=G;
  const bob=rh.frame?2:-2;

  // Shadow
  ctx.save(); ctx.globalAlpha=0.35;
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(x,y+sz*0.42,sz*0.38,sz*0.1,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Draw sprite — Rhydon is bigger so scale 1.1
  ctx.drawImage(prerender(SPR.rhy, null), x-sz*0.55, y-sz*0.55+bob, sz*1.1, sz*1.1);

  // Chase indicator
  if (rh.state==='chase') {
    ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(now/180);
    ctx.strokeStyle='#cc0000'; ctx.lineWidth=2;
    ctx.setLineDash([4,4]); ctx.strokeRect(x-sz*0.55,y-sz*0.55+bob,sz*1.1,sz*1.1);
    ctx.restore();
  }

  // HP bar
  const bw=G*0.9, bh=6;
  const bx=x-bw/2, by=y-sz*0.65-10;
  ctx.fillStyle='#000'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#440000'; ctx.fillRect(bx,by,bw,bh);
  const ratio=rh.hp/rh.maxHp;
  ctx.fillStyle=ratio>0.5?'#22cc22':ratio>0.25?'#cc8800':'#cc2222';
  ctx.fillRect(bx,by,bw*ratio,bh);
  ctx.font='7px "Press Start 2P"'; ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.fillText('RHYDON',x,by-2);
}

// ══════════════════════════════════════════════════════════════
//  APPLY STATE
// ══════════════════════════════════════════════════════════════
function applyState(s) {
  const oldPhase = renderState?.phase ?? 'lobby';
  renderState = s;
  updateSidebar(s);

  if (s.phase==='playing' && oldPhase!=='playing') {
    showScr(null); canvas.className='';
  }
  if (s.phase==='gameover' && oldPhase!=='gameover') {
    showOver(s);
  }
  if (s.phase==='gameover' && s.votes !== undefined) {
    const total = s.players?.length || 2;
    document.getElementById('stvote').textContent = s.votes > 0 ? `VOTOS: ${s.votes}/${total}` : '';
  }
}

// ══════════════════════════════════════════════════════════════
//  NETWORKING  —  WebSocket nativo (sem PeerJS)
//  Servidor: server.py  →  ws://localhost:9001
// ══════════════════════════════════════════════════════════════
const WS_URL = 'ws://localhost:8765';

let isHost    = false;
let ws        = null;        // WebSocket nativo do browser
let engine    = null;
let tickH     = null;
let roomCode  = null;
let _guestName = 'Guest';   // host armazena o nome do guest aqui

// ── Cria sala (host) ──────────────────────────────────────────
function goHost() {
  const name = (document.getElementById('inp-n').value.trim() || 'Host').slice(0, 12);
  setSt('stm', 'Criando sala...', 'w');
  isHost = true;
  myId   = 0;

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'CREATE', name }));
  };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    _handleMsg(msg);
  };
  ws.onerror = () => setSt('stm', 'Erro ao conectar ao servidor.', 'err');
  ws.onclose = () => {
    if (renderState?.phase === 'playing') setSt('stm', 'Conexão encerrada.', 'err');
  };
}

// ── Entra na sala (guest) ─────────────────────────────────────
function goJoin() {
  const name = (document.getElementById('inp-n').value.trim() || 'Guest').slice(0, 12);
  const code = document.getElementById('inp-r').value.trim().toUpperCase();
  if (code.length !== 4) { setSt('stm', 'Código deve ter 4 letras.', 'err'); return; }

  isHost   = false;
  myId     = 1;
  roomCode = code;
  showScr('sj');
  setSt('stj', 'Conectando ao servidor...', 'w');

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'JOIN', code, name }));
  };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    _handleMsg(msg);
  };
  ws.onerror = () => setSt('stj', 'Erro ao conectar ao servidor.', 'err');
  ws.onclose = () => {
    if (renderState?.phase === 'playing') setSt('stm', 'Conexão encerrada.', 'err');
  };
}

// ── Roteador central de mensagens recebidas ───────────────────
function _handleMsg(msg) {
  if (isHost) {
    if (msg.type === 'CREATED') {
      roomCode = msg.code;
      const hostName = document.getElementById('inp-n').value.trim() || 'Host';
      document.getElementById('rctxt').textContent = roomCode;
      showScr('sl');
      updateLobby([{ id: 0, name: hostName, color: COLORS[0] }]);
      setSt('stl', 'Aguardando jogador...', 'w');

    } else if (msg.type === 'GUEST_JOINED') {
      _guestName = msg.name || 'Guest';
      const hostName = document.getElementById('inp-n').value.trim() || 'Host';
      updateLobby([
        { id: 0, name: hostName,   color: COLORS[0] },
        { id: 1, name: _guestName, color: COLORS[1] },
      ]);
      setSt('stl', 'Pronto! Pode iniciar.', 'ok');
      document.getElementById('bstart').style.display = 'block';

    } else if (msg.type === 'INPUT') {
      if (!engine || engine.phase !== 'playing') return;
      const result = engine.input(msg.pid, msg.data);
      if (result === 'restarted' || result === 'voted') _broadcastState();

    } else if (msg.type === 'DISCONNECT') {
      setSt('stm', 'Guest desconectou.', 'err');
    }

  } else {
    if (msg.type === 'JOINED') {
      setSt('stj', 'Conectado! Aguardando host iniciar...', 'ok');

    } else if (msg.type === 'STATE') {
      applyState(msg);

    } else if (msg.type === 'ERROR') {
      setSt('stj', msg.msg || 'Erro.', 'err');

    } else if (msg.type === 'DISCONNECT') {
      setSt('stm', 'Host desconectou.', 'err');
    }
  }
}

// ── Host inicia o jogo ────────────────────────────────────────
function hostStart() {
  if (!isHost) return;
  const hostName = document.getElementById('inp-n').value.trim() || 'Host';
  const pdefs    = [{ id: 0, name: hostName }, { id: 1, name: _guestName }];
  const seed     = Date.now() & 0xffffff;

  engine = new GameEngine();
  engine.init(pdefs, seed);

  if (tickH) clearInterval(tickH);
  let lastT = performance.now();

  tickH = setInterval(() => {
    if (!engine || engine.phase !== 'playing') return;
    const now = performance.now();
    engine.tick(now - lastT);
    lastT = now;
    _broadcastState();
    if (engine.phase === 'gameover') clearInterval(tickH);
  }, 50);

  _broadcastState();
}

// ── Serializa e envia estado; aplica localmente no host ───────
function _broadcastState() {
  const s = engine.snap();
  applyState(s);
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(s));
}

// ── Input: host aplica direto; guest envia pro servidor ───────
function sendInput(data) {
  if (isHost) {
    const result = engine?.input(myId, data);
    if (result === 'restarted' || result === 'voted') _broadcastState();
  } else {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'INPUT', pid: myId, data }));
  }
}

// ══════════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════════
const held={};
document.addEventListener('keydown',e=>{
  const managed=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyX','KeyT'];
  if(managed.includes(e.code)) e.preventDefault();
  held[e.code]=true;
  if(renderState?.phase!=='playing') return;
  if(e.code==='Space') sendInput({t:'B'});
  if(e.code==='KeyX')  sendInput({t:'DETONATE'});
  if(e.code==='KeyT')  sendInput({t:'THUNDER'});
});
document.addEventListener('keyup',e=>{ held[e.code]=false; });

// Poll movement (engine debounces via moveDelay)
setInterval(()=>{
  if(renderState?.phase!=='playing') return;
  if(held['ArrowUp'])    sendInput({t:'M',d:'U'});
  if(held['ArrowDown'])  sendInput({t:'M',d:'D'});
  if(held['ArrowLeft'])  sendInput({t:'M',d:'L'});
  if(held['ArrowRight']) sendInput({t:'M',d:'R'});
},30);

function voteRestart() {
  sendInput({t:'RESTART'});
  const btn=document.getElementById('brst');
  btn.textContent='VOTANDO...'; btn.disabled=true;
}

// ══════════════════════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════════════════════
function showScr(id) {
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  const ov=document.getElementById('ov');
  if (id) { document.getElementById(id)?.classList.add('on'); ov.classList.remove('hidden'); }
  else ov.classList.add('hidden');
}

function setSt(el,msg,type='') {
  const e=document.getElementById(el); if(!e) return;
  e.textContent=msg; e.className='st'+(type?' '+type:'');
}

function updateLobby(players) {
  const el=document.getElementById('lplist'); if(!el) return;
  el.innerHTML='';
  players.forEach(p=>{ const d=document.createElement('div'); d.className='pentry';
    d.innerHTML=`<span class="pdot" style="background:${p.color}"></span>${p.name}${p.id===myId?' (você)':''}`;
    el.appendChild(d); });
}

function showOver(s) {
  const win=s.players?.find(p=>p.id===s.winner);
  let title,col;
  if(s.winner===null||s.winner===undefined){title='💀 EMPATE!';col='#888';}
  else if(s.winner===myId){title='🏆 VOCÊ\nVENCEU!';col='#d4a820';}
  else{title=`${win?.name||'?'}\nVENCEU!`;col='#e05030';}
  const tt=document.getElementById('otitle');
  tt.textContent=title; tt.style.color=col;
  canvas.className=s.winner===myId?'win':'';
  const pl=document.getElementById('oplist'); if(pl){
    pl.innerHTML='';
    s.players?.forEach(p=>{
      const d=document.createElement('div'); d.className='pentry';
      const alive=p.alive||(p.respawnT>0&&p.lives>0);
      d.innerHTML=`<span class="pdot" style="background:${p.color}"></span>${p.name} ${p.id===s.winner?'🏆':alive?'':'💀'} — ${p.lives}♥`;
      pl.appendChild(d);
    });
  }
  document.getElementById('stvote').textContent='';
  document.getElementById('brst').textContent='↺ JOGAR DE NOVO';
  document.getElementById('brst').disabled=false;
  showScr('so');
}

function updateSidebar(s) {
  if (!s) return;
  const ms=Math.max(0,s.timer||0);
  const m=Math.floor(ms/60000), sec=Math.floor((ms%60000)/1000);
  const tel=document.getElementById('tmr');
  tel.textContent=`${m}:${sec.toString().padStart(2,'0')}`;
  tel.className=ms<30000?'d':'';
  document.getElementById('sw').textContent=ms<=ENG.SHRINK_START&&ms>0?'⚠ FECHANDO':'';

  const sbp=document.getElementById('sbp'); if(!sbp) return;
  sbp.innerHTML='';
  s.players?.forEach(p=>{
    const row=document.createElement('div');
    row.className='sbr'+(p.alive?'':' dead');
    row.innerHTML=`<span class="pdot" style="background:${p.alive?p.color:'#222'}"></span><span style="color:${p.alive?p.color:'#333'};font-size:7px">${(p.name||'?').slice(0,6)}</span><span class="sph">${'♥'.repeat(Math.max(0,Math.min(p.lives,5)))}</span>`;
    sbp.appendChild(row);
  });

  const me=s.players?.find(p=>p.id===myId);
  const pul=document.getElementById('pul');
  if(pul&&me){
    const items=[];
    if(me.hasBK) items.push('KICK');
    if(me.hasRM) items.push('REMOTE');
    if(me.hasPG) items.push('GLOVES');
    if(me.hasSK) items.push('SKULL');
    if(me.hasTW) items.push(`⚡×${me.hasTW}`);
    if(me.isIV)  items.push('★ INVINC');
    if(me.isCloaked) items.push('👻CLOAKED');
    if(me.isDD)  items.push('🐉DRAG');
    if(me.hasMS) items.push('🛡SHIELD');
    if(me.isME)  items.push('✨MEGA');
    items.push(`💣×${me.numBombs} 🔥×${me.bombSize}`);
    pul.innerHTML=items.join('<br>')||'—';
  }
}

showScr('sm');
render();
